project:
  type: website
  output-dir: ../docs/slides
  render:
    - "00_intro/*.qmd"
    - "01_github/*.qmd"
    - "02_colab/*.qmd"
    - "03_latex/*.qmd"
    - "04_quarto/*.qmd"

website:
  title: "Presentaciones — Aprende a gestionar tu trabajo académico"

format:
  revealjs:
    theme: [default, custom.scss]
    slide-number: true
    progress: true
    history: false
    transition: fade
    transition-speed: fast
    incremental: false
    fig-align: center
    highlight-style: github
    code-block-bg: true
    center: false
    width: 1280
    height: 720
    margin: 0.08
    footer: "Aprende USM 2026 · UTFSM"
    logo: "../assets/img/brand/brand__usm.png"

execute:
  echo: false
  warning: false

lang: es
